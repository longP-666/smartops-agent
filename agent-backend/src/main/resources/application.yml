server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ticket-agent-assistant
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smartops_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

agent:
  rag:
    top-k: ${RAG_TOP_K:5}
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.34}
    chunk-size: ${RAG_CHUNK_SIZE:700}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:120}
  ai:
    enabled: ${AI_ENABLED:false}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${AI_API_KEY:}
    chat-model: ${AI_CHAT_MODEL:gpt-4o-mini}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:25}
  security:
    internal-api-key: ${INTERNAL_API_KEY:dev-api-key}

logging:
  level:
    com.smartops.agent: INFO
